spring:
  application:
    name: transaction

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintechwave_tx}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-256bits-long!}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}

server:
  port: 8082
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    com.fintechwave.transaction: DEBUG
    org.springframework.security: INFO
