spring:
  application:
    name: notification-service

  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        multiplier: 1.5
        max-interval: 10000

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintechwave_notif}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
    consumer:
      group-id: notification-service
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

  # Email (SendGrid SMTP relay or standard SMTP)
  mail:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:apikey}
    password: ${SMTP_PASSWORD:SG.placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/fintechwave/protocol/openid-connect/certs

server:
  port: 8086
  error:
    include-message: never
    include-stacktrace: never

app:
  keycloak:
    issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8180}/realms/fintechwave
    jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/fintechwave/protocol/openid-connect/certs
    expected-audience: fintechwave-platform

  notification:
    from-email: ${NOTIFICATION_FROM_EMAIL:noreply@fintechwave.com}
    from-name:  FintechWave
    # Channels: EMAIL | SMS | PUSH (comma-separated to enable)
    enabled-channels: EMAIL
    # Retention: 90 days (sweeper job removes older records)
    retention-days: 90

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info
  health:
    mail:
      enabled: false

logging:
  level:
    "[com.fintechwave.notification]": DEBUG
    "[org.springframework.security]": INFO
    "[org.springframework.kafka]": INFO
    "[org.springframework.mail]": INFO
