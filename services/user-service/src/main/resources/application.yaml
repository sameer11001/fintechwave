spring:
  application:
    name: user-service

  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        multiplier: 1.5
        max-interval: 10000

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintechwave_users}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: user-service
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:  ${app.keycloak.issuer-uri}
          jwk-set-uri: ${app.keycloak.jwk-set-uri}

server:
  port: 8081
  error:
    include-message: never
    include-stacktrace: never

app:
  keycloak:
    issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8180}/realms/fintechwave
    jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/fintechwave/protocol/openid-connect/certs
    expected-audience: fintechwave-platform
    admin:
      base-url:      ${KEYCLOAK_URL:http://localhost:8180}
      realm:         fintechwave
      client-id:     ${KEYCLOAK_ADMIN_CLIENT_ID:user-service}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:hHGxsgnCIbqrojiSJdp1tKMNBfBboBNv}

logging:
  level:
    "[com.fintechwave.iam]": DEBUG
    "[org.springframework.security]": INFO
    "[org.springframework.cloud.config]": INFO
    "[org.springframework.kafka]": INFO
