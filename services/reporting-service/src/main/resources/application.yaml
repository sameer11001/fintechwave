spring:
  application:
    name: reporting-service

  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        multiplier: 1.5
        max-interval: 10000

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintechwave_report}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
    consumer:
      group-id: reporting-service
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/fintechwave/protocol/openid-connect/certs

server:
  port: 8087
  error:
    include-message: never
    include-stacktrace: never

app:
  keycloak:
    issuer-uri: ${KEYCLOAK_EXTERNAL_URL:http://localhost:8180}/realms/fintechwave
    jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/fintechwave/protocol/openid-connect/certs
    expected-audience: fintechwave-platform

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    "[com.fintechwave.reporting]": DEBUG
    "[org.springframework.security]": INFO
    "[org.springframework.kafka]": INFO
