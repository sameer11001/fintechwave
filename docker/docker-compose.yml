services:

  postgres-iam:
    image: postgres:16-alpine
    container_name: fintechwave-postgres-iam
    environment:
      POSTGRES_DB:       fintechwave_iam
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-iam-data:/var/lib/postgresql/data
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintechwave_iam"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  postgres-tx:
    image: postgres:16-alpine
    container_name: fintechwave-postgres-tx
    environment:
      POSTGRES_DB:       fintechwave_tx
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-tx-data:/var/lib/postgresql/data
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintechwave_tx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  iam-service:
    image: fintechwave/iam:latest
    container_name: fintechwave-iam
    environment:
      DB_HOST:                  postgres-iam
      DB_PORT:                  5432
      DB_NAME:                  fintechwave_iam
      DB_USER:                  postgres
      DB_PASS:                  postgres
      JWT_SECRET:               ${JWT_SECRET:-change-me-in-production-must-be-256-bits-long!!}
      JWT_ACCESS_TTL_MINUTES:   ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS:     ${JWT_REFRESH_TTL_DAYS:-7}
    ports:
      - "8081:8081"
    networks:
      - fintechwave
    depends_on:
      postgres-iam:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/swagger-ui/index.html > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  transaction-service:
    image: fintechwave/transaction:latest
    container_name: fintechwave-transaction
    environment:
      DB_HOST: postgres-tx
      DB_PORT: 5432
      DB_NAME: fintechwave_tx
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET:               ${JWT_SECRET:-change-me-in-production-must-be-256-bits-long!!}
      JWT_ACCESS_TTL_MINUTES:   ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS:     ${JWT_REFRESH_TTL_DAYS:-7}
    ports:
      - "8082:8082"
    networks:
      - fintechwave
    depends_on:
      postgres-tx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/ > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-iam-data:
    driver: local
  postgres-tx-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  fintechwave:
    driver: bridge
