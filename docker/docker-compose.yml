services:

  postgres:
    image: postgres:16-alpine
    container_name: fintechwave-postgres
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB:       postgres         
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: no

  keycloak-db:
    image: postgres:16-alpine
    container_name: fintechwave-keycloak-db
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB:       keycloak_db         
    ports:
      - "5433:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: no

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    container_name: fintechwave-keycloak
    command: start-dev
    environment:
      KC_DB:                    postgres
      KC_DB_URL:                jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME:           postgres
      KC_DB_PASSWORD:           ${DB_PASS:-postgres}
      KEYCLOAK_ADMIN:           ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD:  ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT:             8080
      KC_HOSTNAME_STRICT:       "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_SPI_EVENTSLISTENER_WEBHOOK_URL: "http://host.docker.internal:8081/api/v1/internal/webhook/keycloak/user-registered"
    ports:
      - "8180:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./keycloak/providers:/opt/keycloak/providers
    networks:
      - fintechwave
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /realms/master HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;grep -q '200 OK' <&3"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: no

  config-server:
    image: fintechwave/config-server:latest
    container_name: fintechwave-config-server
    ports:
      - "8888:8888"
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fintechwave-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    ports:
      - "29092:29092"
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: no

  redis:
    image: redis:7.2-alpine
    container_name: fintechwave-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: no

  minio:
    image: minio/minio:latest
    container_name: fintechwave-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: no

  # ─── Application Services ─────────────────────────────────────────────────

  gateway:
    image: fintechwave/gateway:latest
    container_name: fintechwave-gateway
    environment:
      CONFIG_SERVER_URI:   http://config-server:8888
      KEYCLOAK_URL:        http://keycloak:8080
      REDIS_HOST:          redis
      REDIS_PORT:          6379
    ports:
      - "8080:8080"
    networks:
      - fintechwave
    depends_on:
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  user-service:
    image: fintechwave/user-service:latest
    container_name: fintechwave-user
    environment:
      CONFIG_SERVER_URI:   http://config-server:8888
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             fintechwave_users
      DB_USER:             postgres
      DB_PASS:             ${DB_PASS:-postgres}
      KEYCLOAK_URL:        http://keycloak:8080
      KAFKA_BOOTSTRAP:     kafka:9092
    ports:
      - "8081:8081"
    networks:
      - fintechwave
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  kyc-service:
    image: fintechwave/kyc-service:latest
    container_name: fintechwave-kyc
    environment:
      CONFIG_SERVER_URI:   http://config-server:8888
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             fintechwave_kyc
      DB_USER:             postgres
      DB_PASS:             ${DB_PASS:-postgres}
      KEYCLOAK_URL:        http://keycloak:8080
      KAFKA_BOOTSTRAP:     kafka:9092
      MINIO_ENDPOINT:      http://minio:9000
      MINIO_ACCESS_KEY:    ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY:    ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "8082:8082"
    networks:
      - fintechwave
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  ledger-service:
    image: fintechwave/ledger-service:latest
    container_name: fintechwave-ledger
    environment:
      CONFIG_SERVER_URI:   http://config-server:8888
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             fintechwave_ledger
      DB_USER:             postgres
      DB_PASS:             ${DB_PASS:-postgres}
      KEYCLOAK_URL:        http://keycloak:8080
      KAFKA_BOOTSTRAP:     kafka:9092
    ports:
      - "8083:8083"
    networks:
      - fintechwave
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  transaction-service:
    image: fintechwave/transaction-service:latest
    container_name: fintechwave-transaction
    environment:
      CONFIG_SERVER_URI:       http://config-server:8888
      DB_HOST:                 postgres
      DB_PORT:                 5432
      DB_NAME:                 fintechwave_tx
      DB_USER:                 postgres
      DB_PASS:                 ${DB_PASS:-postgres}
      KEYCLOAK_URL:            http://keycloak:8080
      KAFKA_BOOTSTRAP:         kafka:9092
      LEDGER_SERVICE_HOST:     ledger-service
      STRIPE_API_KEY:          ${STRIPE_API_KEY:-sk_test_51Tg6jpFYLnavoJLBI9Wngbq7jwmmU2FsOztcX3VJWHKCa538C4K8u3VPb5p413UizHOjIZFx9Z3ikA7IQxQM0AGf00OpdNmv2X}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET:-whsec_4e48d4fec09ffb4c2fec97d4a600c5fdfeb83c5b033644b88fc3b503fc5f3e55}
    ports:
      - "8084:8084"
    networks:
      - fintechwave
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  fraud-service:
    image: fintechwave/fraud-service:latest
    container_name: fintechwave-fraud
    environment:
      CONFIG_SERVER_URI:   http://config-server:8888
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             fintechwave_fraud
      DB_USER:             postgres
      DB_PASS:             ${DB_PASS:-postgres}
      KEYCLOAK_URL:        http://keycloak:8080
      KAFKA_BOOTSTRAP:     kafka:9092
      REDIS_HOST:          redis
      REDIS_PORT:          6379
    ports:
      - "8085:8085"
    networks:
      - fintechwave
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  notification-service:
    image: fintechwave/notification-service:latest
    container_name: fintechwave-notification
    environment:
      CONFIG_SERVER_URI:    http://config-server:8888
      DB_HOST:              postgres
      DB_PORT:              5432
      DB_NAME:              fintechwave_notif
      DB_USER:              postgres
      DB_PASS:              ${DB_PASS:-postgres}
      KEYCLOAK_URL:         http://keycloak:8080
      KAFKA_BOOTSTRAP:      kafka:9092
      SMTP_HOST:            ${SMTP_HOST:-smtp.sendgrid.net}
      SMTP_PORT:            ${SMTP_PORT:-587}
      SMTP_USERNAME:        ${SMTP_USERNAME:-apikey}
      SMTP_PASSWORD:        ${SMTP_PASSWORD:-SG.placeholder}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL:-noreply@fintechwave.com}
    ports:
      - "8086:8086"
    networks:
      - fintechwave
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  reporting-service:
    image: fintechwave/reporting-service:latest
    container_name: fintechwave-reporting
    environment:
      CONFIG_SERVER_URI:   http://config-server:8888
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             fintechwave_report
      DB_USER:             postgres
      DB_PASS:             ${DB_PASS:-postgres}
      KEYCLOAK_URL:        http://keycloak:8080
      KAFKA_BOOTSTRAP:     kafka:9092
    ports:
      - "8087:8087"
    networks:
      - fintechwave
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

volumes:
  postgres-data:
  keycloak-db-data:
  minio-data:

networks:
  fintechwave:
    driver: bridge
