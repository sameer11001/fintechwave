global:
  resolve_timeout: 5m

route:
  group_by: ['service', 'alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/dummy'
        channel: '#fintechwave-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Service:* {{ .Labels.service }}
            *Description:* {{ .Annotations.description }}
            *Trace:* {{ .Annotations.runbook }}
          {{ end }}
