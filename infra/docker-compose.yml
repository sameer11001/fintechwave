services:

  postgres:
    image: postgres:16-alpine
    container_name: fintechwave-postgres
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=4
        -c max_replication_slots=4
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB:       postgres         
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: no

  keycloak-db:
    image: postgres:16-alpine
    container_name: fintechwave-keycloak-db
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB:       keycloak_db         
    ports:
      - "5433:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: no

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    container_name: fintechwave-keycloak
    command: start-dev
    environment:
      KC_DB:                    postgres
      KC_DB_URL:                jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME:           postgres
      KC_DB_PASSWORD:           ${DB_PASS:-postgres}
      KEYCLOAK_ADMIN:           ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD:  ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT:             8080
      KC_HOSTNAME_STRICT:       "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_METRICS_ENABLED:       "true"
      KC_SPI_EVENTSLISTENER_WEBHOOK_URL: "http://host.docker.internal:8081/api/v1/internal/webhook/keycloak/user-registered"
      JAVA_TOOL_OPTIONS:   "-javaagent:/agents/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME:   keycloak
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER:  otlp
    ports:
      - "8180:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./keycloak/providers:/opt/keycloak/providers
      - ./observability/agents:/agents:ro
    networks:
      - fintechwave
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /realms/master HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;grep -q '200 OK' <&3"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: no

  config-server:
    image: fintechwave/config-server:latest
    container_name: fintechwave-config-server
    environment:
      JAVA_TOOL_OPTIONS:   "-javaagent:/agents/opentelemetry-javaagent.jar -Xmx256m -Xms128m"
      OTEL_SERVICE_NAME:   config-server
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER:  otlp
    ports:
      - "8888:8888"
    volumes:
      - ./observability/agents:/agents:ro
    networks:
      - fintechwave
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fintechwave-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    ports:
      - "29092:29092"
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: no

  redis:
    image: redis:7.2-alpine
    container_name: fintechwave-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: no

# ─── CQRS Infrastructure ──────────────────────────────────────────────────────

  kafka-connect:
    image: debezium/connect:2.7.3.Final
    container_name: fintechwave-kafka-connect
    environment:
      BOOTSTRAP_SERVERS:        kafka:9092
      GROUP_ID:                 fintechwave-connect
      CONFIG_STORAGE_TOPIC:     connect.configs
      OFFSET_STORAGE_TOPIC:     connect.offsets
      STATUS_STORAGE_TOPIC:     connect.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - "8088:8083"
    networks:
      - fintechwave
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  debezium-init:
    image: curlimages/curl:latest
    container_name: fintechwave-debezium-init
    depends_on:
      - kafka-connect
    networks:
      - fintechwave
    volumes:
      - ./debezium:/debezium:ro
    command: ["sh", "/debezium/register-connectors.sh"]

  mongodb:
    image: mongo:7.0
    container_name: fintechwave-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongoroot}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-mongopassword}
      MONGO_INITDB_DATABASE:      fintechwave_views
    ports:
      - "27017:27017"
    command: mongod --wiredTigerCacheSizeGB 1 --logpath /var/log/mongodb/mongod.log --logappend --setParameter logLevel=1
    volumes:
      - mongodb-data:/data/db
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
    container_name: fintechwave-elasticsearch
    environment:
      discovery.type:            single-node
      xpack.security.enabled:    "false"
      ES_JAVA_OPTS:              "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v 'red' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: fintechwave-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - fintechwave
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: no

  # ─── Application Services ─────────────────────────────────────────────────

  gateway:
    image: fintechwave/gateway:latest
    container_name: fintechwave-gateway
    environment:
      JAVA_TOOL_OPTIONS:   "-javaagent:/agents/opentelemetry-javaagent.jar -Xmx256m -Xms128m"
      OTEL_SERVICE_NAME:   gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER:  otlp
      CONFIG_SERVER_URI:   http://config-server:8888
      KEYCLOAK_URL:        http://keycloak:8080
      REDIS_HOST:          redis
      REDIS_PORT:          6379
    ports:
      - "8080:8080"
    volumes:
      - ./observability/agents:/agents:ro
    networks:
      - fintechwave
    depends_on:
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health > /dev/null 2>&1 || exit 1"]
