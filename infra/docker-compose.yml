      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: no

# ─── Observability & Monitoring ───────────────────────────────────────────

  minio-setup:
    image: minio/mc
    container_name: fintechwave-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - fintechwave
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      (/usr/bin/mc mb myminio/loki-data || true)
      "

  loki:
    image: grafana/loki:3.0.0
    container_name: fintechwave-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fintechwave
    depends_on:
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  tempo:
    image: grafana/tempo:2.4.1
    container_name: fintechwave-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4317"  # otlp grpc
      - "4318"  # otlp http
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fintechwave

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: fintechwave-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=remote-write-receiver
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fintechwave

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: fintechwave-otel-collector
    environment:
      DB_PASS: ${DB_PASS:-postgres}
      MONGO_USER: ${MONGO_USER:-mongoroot}
      MONGO_PASS: ${MONGO_PASS:-mongopassword}
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fintechwave
    depends_on:
      - loki
      - tempo
      - prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fintechwave-grafana
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=grafana-secret
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=http://localhost:8180/realms/fintechwave/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://keycloak:8080/realms/fintechwave/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://keycloak:8080/realms/fintechwave/protocol/openid-connect/userinfo
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(roles[*], 'admin') && 'Admin' || 'Viewer'
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fintechwave
    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  postgres-data:
  keycloak-db-data:
  minio-data:
  mongodb-data:
  elasticsearch-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  fintechwave:
    driver: bridge
