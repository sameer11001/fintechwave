server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: iam-service
          uri: http://iam-service:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: transaction-service
          uri: http://transaction-service:8082
          predicates:
            - Path=/api/v1/transactions/**
